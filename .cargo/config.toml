# Use lld as the linker for dev builds. manifold-app links every crate, so the
# link step dominates incremental rebuilds. lld is a brew dependency:
#   brew install lld
# If you ever uninstall lld, comment the block below out — Apple's default
# linker (ld-prime) is the fallback and is itself fast on Apple Silicon, so
# this is a "measure it" optimisation, not a load-bearing one.
[target.aarch64-apple-darwin]
rustflags = ["-C", "link-arg=-fuse-ld=/opt/homebrew/opt/lld/bin/ld64.lld"]

# Shared compile cache across worktrees (brew install sccache). Cargo compiles
# external deps non-incrementally, so sccache serves them from cache on every
# cold worktree build; workspace crates stay incremental (sccache passes those
# through uncached — worktree-pool warmth covers them, see
# .claude/GIT_TREE_DISCIPLINE.md §2c). Verified 2026-07-10: incremental builds
# pass through without error; dep crates cache-hit across a wiped target dir.
# If sccache misbehaves, comment this block out — plain rustc is the fallback.
[build]
rustc-wrapper = "/opt/homebrew/bin/sccache"

# `cargo xtask ui-snap <scene> [--dump]` → the headless UI snapshot harness
# (feature-gated subcommand of manifold-app). See docs/HEADLESS_UI_HARNESS.md.
# `cargo xtask perf-soak <project> --seconds N [--start <beats>]
# [--update-baseline]` → the headless frame-budget soak gate. See
# docs/PERF_BUDGET_GATE_DESIGN.md P1. Both subcommands dispatch off argv[1]
# in the same `manifold` binary — one dispatcher, two feature-gated modules.
[alias]
xtask = "run --quiet -p manifold-app --features ui-snapshot,perf-soak --"

# sccache's default 10G disk cache evicts under this workspace's dep graph ×
# many worktrees; 30G keeps external-dep objects resident. The sccache server
# reads this only at startup — it picks it up after its next idle shutdown
# (default 10 min); never stop the server manually while a build may be live.
[env]
SCCACHE_CACHE_SIZE = "30G"
