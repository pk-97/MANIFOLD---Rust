[package]
name = "manifold-app"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "manifold"
path = "src/main.rs"

[dependencies]
manifold-core = { path = "../manifold-core" }
manifold-editing = { path = "../manifold-editing" }
manifold-ui = { path = "../manifold-ui" }
manifold-playback = { path = "../manifold-playback" }
manifold-renderer = { path = "../manifold-renderer" }
manifold-io = { path = "../manifold-io" }
winit = { workspace = true }
wgpu = { workspace = true }
log = { workspace = true }
env_logger = { workspace = true }
pollster = { workspace = true }
rfd = "0.15"
serde = { workspace = true }
serde_json = { workspace = true }
crossbeam-channel = "0.5"

# IOSurface bridge for cross-device GPU texture sharing (macOS)
[target.'cfg(target_os = "macos")'.dependencies]
io-surface = "0.16"
metal = "0.33"
objc = "0.2"
foreign-types = "0.5"
core-foundation = "0.10"
wgpu-hal = "28"
wgpu-types = "28"

[lints.rust]
unexpected_cfgs = { level = "allow", check-cfg = ['cfg(feature, values("cargo-clippy"))'] }
