[package]
name = "manifold-audio"
version = "0.1.0"
edition = "2024"
publish = false

[dependencies]
log = { workspace = true }
cpal = "0.15"
ringbuf = "0.4"
rustfft = "6"

# macOS ScreenCaptureKit FFI (per-app audio capture)
[target.'cfg(target_os = "macos")'.dependencies]
objc2 = "0.6"
objc2-foundation = { version = "0.3", features = ["NSError", "NSString", "NSArray", "NSObjCRuntime"] }
block2 = "0.6"

[lints]
workspace = true

# `manifold-audio` is the stub crate (per CLAUDE.md crate table) —
# placeholder for future DSP work. `rustfft` is pre-declared so the
# stub already has its anticipated math dep wired; cargo-machete sees
# it as unused today, correctly. Drop the ignore once real consumers land.
[package.metadata.cargo-machete]
ignored = ["rustfft"]
