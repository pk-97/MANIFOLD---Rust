[package]
name = "manifold-gpu"
version = "0.1.0"
edition = "2024"

[dependencies]
# WGSL parsing + validation + MSL output + SPIR-V output
naga = { version = "28", features = ["wgsl-in", "msl-out", "spv-out"] }
bytemuck = { version = "1", features = ["derive"] }
log = "0.4"

# SPIR-V optimization (wraps Google SPIRV-Tools C++)
spirv-tools = { version = "0.13", features = ["use-compiled-tools"] }
# SPIR-V → MSL compilation (wraps SPIRV-Cross C)
spirv-cross2 = { version = "0.4", default-features = false, features = ["msl"] }

# Native Metal backend
[target.'cfg(target_os = "macos")'.dependencies]
metal = "0.33"
objc = "0.2.4"
block = "0.1"
core-graphics-types = "0.2"
raw-window-handle = "0.6"

[lints]
workspace = true
