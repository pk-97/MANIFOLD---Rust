[package]
name = "manifold-gpu"
version = "0.1.0"
edition = "2024"

[dependencies]
# Shared — WGSL parsing + validation
naga = { version = "28", features = ["wgsl-in"] }
bytemuck = { version = "1", features = ["derive"] }
log = "0.4"

# Metal backend (macOS) — raw metal crate, naga MSL output
[target.'cfg(target_os = "macos")'.dependencies]
metal = "0.33"
naga = { version = "28", features = ["wgsl-in", "msl-out"] }

# wgpu backend (Windows/Linux)
[target.'cfg(not(target_os = "macos"))'.dependencies]
wgpu = "28"
naga = { version = "28", features = ["wgsl-in", "spv-out"] }
