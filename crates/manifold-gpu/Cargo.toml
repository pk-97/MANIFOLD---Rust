[package]
name = "manifold-gpu"
version = "0.1.0"
edition = "2024"

[dependencies]
# WGSL parsing + validation + MSL output
naga = { version = "28", features = ["wgsl-in", "msl-out"] }
bytemuck = { version = "1", features = ["derive"] }
log = "0.4"

# Native Metal backend
[target.'cfg(target_os = "macos")'.dependencies]
metal = "0.33"
