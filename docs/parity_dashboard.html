<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MANIFOLD — Parity Tracker</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #21262d;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --accent: #58a6ff;
    --done: #3fb950;
    --partial: #d29922;
    --todo: #f85149;
    --bar-bg: #21262d;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 32px;
    line-height: 1.5;
  }
  h1 {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 4px;
    letter-spacing: -0.5px;
  }
  .subtitle {
    color: var(--text-dim);
    font-size: 14px;
    margin-bottom: 32px;
  }
  .subtitle span { color: var(--text); font-weight: 600; }
  .data-source {
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 8px;
    font-style: italic;
  }

  /* Top stats row */
  .stats-row {
    display: flex;
    gap: 16px;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    min-width: 160px;
    flex: 1;
  }
  .stat-card .label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    margin-bottom: 4px;
  }
  .stat-card .value {
    font-size: 36px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .stat-card .detail {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 2px;
  }
  .stat-card .value.done { color: var(--done); }
  .stat-card .value.partial { color: var(--partial); }
  .stat-card .value.todo { color: var(--todo); }
  .stat-card .value.accent { color: var(--accent); }

  /* Overall progress bar */
  .overall-progress {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 32px;
  }
  .overall-progress .header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 10px;
  }
  .overall-progress .header h2 {
    font-size: 16px;
    font-weight: 600;
  }
  .overall-progress .header .pct {
    font-size: 24px;
    font-weight: 700;
    color: var(--accent);
  }
  .progress-bar {
    height: 12px;
    background: var(--bar-bg);
    border-radius: 6px;
    overflow: hidden;
    display: flex;
  }
  .progress-bar .seg-done {
    background: var(--done);
    transition: width 0.5s ease;
  }
  .progress-bar .seg-partial {
    background: var(--partial);
    transition: width 0.5s ease;
  }
  .progress-legend {
    display: flex;
    gap: 20px;
    margin-top: 8px;
    font-size: 12px;
    color: var(--text-dim);
  }
  .progress-legend .dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 5px;
    vertical-align: middle;
  }

  /* Subsystem grid */
  .section-title {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 16px;
    margin-top: 8px;
  }
  .subsystem-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
    margin-bottom: 32px;
  }
  .subsystem-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }
  .subsystem-card:hover {
    border-color: var(--accent);
    background: var(--surface2);
  }
  .subsystem-card.active {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent);
  }
  .subsystem-card .name {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 8px;
    text-transform: capitalize;
  }
  .subsystem-card .mini-bar {
    height: 6px;
    background: var(--bar-bg);
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 6px;
  }
  .subsystem-card .mini-bar .fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.5s ease;
  }
  .subsystem-card .pct-label {
    font-size: 13px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .subsystem-card .gap-counts {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  /* Tier sections */
  .tier-section {
    margin-bottom: 28px;
  }
  .tier-header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .tier-header h3 {
    font-size: 16px;
    font-weight: 600;
  }
  .tier-header .tier-stats {
    font-size: 13px;
    color: var(--text-dim);
  }
  .tier-header .tier-bar {
    flex: 1;
    max-width: 200px;
    height: 6px;
    background: var(--bar-bg);
    border-radius: 3px;
    overflow: hidden;
  }
  .tier-header .tier-bar .fill {
    height: 100%;
    border-radius: 3px;
  }

  /* Gap rows */
  .gap-row {
    display: grid;
    grid-template-columns: 90px 1fr 100px 80px;
    align-items: center;
    padding: 10px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 6px;
    font-size: 14px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .gap-row:hover { border-color: var(--accent); }
  .gap-row .gap-id {
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 12px;
    font-weight: 600;
    color: var(--accent);
  }
  .gap-row .gap-title {
    padding-right: 16px;
  }
  .gap-row .gap-subsystem {
    font-size: 12px;
    color: var(--text-dim);
    text-transform: capitalize;
  }
  .badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    text-align: center;
  }
  .badge.done { background: rgba(63,185,80,0.15); color: var(--done); }
  .badge.partial { background: rgba(210,153,34,0.15); color: var(--partial); }
  .badge.todo { background: rgba(248,81,73,0.15); color: var(--todo); }

  /* LOC chip */
  .loc {
    font-size: 11px;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
    text-align: right;
  }

  /* Gap detail expand */
  .gap-row .notes {
    display: none;
    grid-column: 1 / -1;
    margin-top: 8px;
    padding: 10px 12px;
    background: var(--surface2);
    border-radius: 6px;
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.6;
  }
  .gap-row.expanded .notes { display: block; }
  .gap-row .commit-link {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 11px;
    color: var(--done);
    margin-top: 4px;
  }

  /* Filter bar */
  .filter-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-bar .filter-label {
    font-size: 13px;
    color: var(--text-dim);
    margin-right: 4px;
  }
  .filter-btn {
    padding: 4px 14px;
    border-radius: 16px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--text-dim); color: var(--text); }
  .filter-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(88,166,255,0.1); }

  .severity-tag {
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-left: 8px;
  }
  .severity-tag.catastrophic { color: #f85149; }
  .severity-tag.critical { color: #f0883e; }
  .severity-tag.high { color: #d29922; }
  .severity-tag.medium { color: var(--text-dim); }
  .severity-tag.low { color: #484f58; }

  /* Responsive */
  @media (max-width: 700px) {
    body { padding: 16px; }
    .gap-row {
      grid-template-columns: 80px 1fr;
      gap: 4px;
    }
    .gap-row .gap-subsystem, .gap-row .loc { display: none; }
  }
</style>
</head>

37,"id":"GAP-CORE-4","tier":4,"subsystem":"core","title":"Port remaining ~40 missing methods across core structs","severity":"medium","est_loc":600,"status":"done","commit":"b59ad6d","notes":"80+ methods added: EffectInstance (13 methods + ParamSource impl), GeneratorParamState (13 methods), ParameterDriver (constructor + BeatDivision methods), ParamEnvelope (2 constructors), TimelineClip (5 methods), Layer (8 methods), Timeline (7 methods), ProjectSettings (19 methods), RecordingProvenance (13 methods), PercussionImportState (ensure_valid), VideoLibrary (5 methods), MidiNoteParser (new module). EffectDefinitionRegistry + GeneratorDefinitionRegistry + EffectCategoryRegistry as new modules."},{"number":38,"id":"GAP-IO-4","tier":4,"subsystem":"io","title":"VideoExporter","severity":"medium","est_loc":1000,"status":"todo","commit":null,"notes":"1,275 lines. FFmpeg subprocess, GPU readback, Metal encoding, HDR export, audio muxing."},{"number":39,"id":"GAP-CORE-5","tier":4,"subsystem":"core","title":"Fix ParameterDriver random hash to match Unity's algorithm","severity":"medium","est_loc":20,"status":"done","commit":"b59ad6d","notes":"Fixed: Random waveform now uses Unity's 3-round mixing hash (HashToFloat). Also fixed tempo.rs get_bpm_at_beat initial value, negative beat/seconds handling, and quantize_time_seconds sentinel preservation."},{"number":40,"id":"GAP-LED-1","tier":5,"subsystem":"led_external","title":"Port IExternalOutput trait + ExternalOutputType + LEDConstants + LedSettings","severity":"medium","est_loc":100,"status":"todo","commit":null,"notes":"Type definitions and constants for LED output subsystem."},{"number":41,"id":"GAP-LED-2","tier":5,"subsystem":"led_external","title":"Port ArtNetDmxConverter + ArtNetOutput + LEDOutputController","severity":"medium","est_loc":600,"status":"todo","commit":null,"notes":"Full pipeline: compositor blit, GPU readback, DMX pack, UDP send."},{"number":42,"id":"GAP-LED-3","tier":5,"subsystem":"led_external","title":"Translate LEDEdgeExtend.shader to WGSL","severity":"medium","est_loc":60,"status":"todo","commit":null,"notes":null},{"number":43,"id":"GAP-EXT-1","tier":5,"subsystem":"external_window","title":"Port external monitor output (second winit window + wgpu surface)","severity":"medium","est_loc":400,"status":"todo","commit":null,"notes":"NativeMonitorWindowController.cs (574 lines). HDR logic (EDR headroom, PQ decode) worth preserving."},{"number":44,"id":"GAP-DIAG-1","tier":5,"subsystem":"diagnostics","title":"Port DiagnosticsDB + PerfRollupAccumulator + CreativeSnapshotBuilder","severity":"low","est_loc":800,"status":"todo","commit":null,"notes":"1,417 lines across 4 files. SQLite telemetry. Not needed for visual/behavioral parity."},{"number":45,"id":"GAP-CORE-8","tier":2,"subsystem":"core","title":"VideoLibrary disk-scanning methods (ScanDirectory, ScanLayerFolder, ProcessVideoFile)","severity":"medium","est_loc":150,"status":"todo","commit":null,"notes":"VideoLibrary struct exists with add/remove/find/clear methods, but the filesystem scanning methods that rebuild the library from disk are missing. Unity: VideoLibrary.cs ScanDirectory(), ScanLayerFolder(), ProcessVideoFile()."},{"number":46,"id":"GAP-CORE-9","tier":2,"subsystem":"core","title":"Fix 5 minor core behavioral divergences","severity":"low","est_loc":30,"status":"todo","commit":null,"notes":"1) TempoMapConverter.seconds_per_beat_from_bpm() doesn't clamp BPM to 20-300. 2) TimelineClip.overlaps_with() doesn't check layer index (Unity returns false for different layers). 3) EffectInstance.ensure_base_values() doesn't check length mismatch, only is_none(). 4) Layer.change_generator_type() doesn't propagate to clips via UpdateClipGeneratorTypes(). 5) BeatQuantizer negative sentinel \u2014 verify if already fixed in b59ad6d."}]};

const TIER_NAMES = {
  0: 'Tier 0 \u2014 Catastrophic',
  1: 'Tier 1 \u2014 Critical Path',
  2: 'Tier 2 \u2014 Core Gaps',
  3: 'Tier 3 \u2014 Audio / Percussion',
  4: 'Tier 4 \u2014 Advanced Features',
  5: 'Tier 5 \u2014 External / LED / Diagnostics'
};

let data = null;
let dataSource = 'embedded';
let activeFilter = 'all';
let activeSubsystem = null;

async function loadData() {
  // Try fetching live JSON first (works when served via HTTP)
  try {
    const resp = await fetch('parity_tracker.json');
    if (resp.ok) {
      data = await resp.json();
      dataSource = 'live';
    }
  } catch (e) {
    // file:// protocol or network error — fall through
  }

  // Fall back to embedded snapshot
  if (!data) {
    data = EMBEDDED_DATA;
    dataSource = 'embedded';
  }

  render();
}

function render() {
  const gaps = data.gaps;
  const total = gaps.length;
  const done = gaps.filter(g => g.status === 'done').length;
  const partial = gaps.filter(g => g.status === 'partial').length;
  const todo = gaps.filter(g => g.status === 'todo').length;
  const totalLoc = gaps.reduce((s, g) => s + (g.est_loc || 0), 0);
  const doneLoc = gaps.filter(g => g.status === 'done').reduce((s, g) => s + (g.est_loc || 0), 0);
  const partialLoc = gaps.filter(g => g.status === 'partial').reduce((s, g) => s + (g.est_loc || 0), 0);

  // Data source indicator
  const sourceEl = document.getElementById('data-source');
  if (dataSource === 'live') {
    sourceEl.textContent = 'Reading live from parity_tracker.json';
    sourceEl.style.color = 'var(--done)';
  } else {
    sourceEl.textContent = 'Using embedded snapshot (open via HTTP server for live updates)';
  }

  // Subtitle
  document.getElementById('subtitle').innerHTML =
    `Last updated: <span>${data.metadata.last_updated}</span> \u00b7 Functional completion: <span>${data.metadata.true_functional_completion_pct}%</span>`;

  // Stats cards
  const statsHTML = `
    <div class="stat-card"><div class="label">Total Gaps</div><div class="value accent">${total}</div><div class="detail">${totalLoc.toLocaleString()} est. LOC</div></div>
    <div class="stat-card"><div class="label">Done</div><div class="value done">${done}</div><div class="detail">${doneLoc.toLocaleString()} LOC</div></div>
    <div class="stat-card"><div class="label">Partial</div><div class="value partial">${partial}</div><div class="detail">${partialLoc.toLocaleString()} LOC</div></div>
    <div class="stat-card"><div class="label">Todo</div><div class="value todo">${todo}</div><div class="detail">${(totalLoc - doneLoc - partialLoc).toLocaleString()} LOC remaining</div></div>
  `;
  document.getElementById('stats-row').innerHTML = statsHTML;

  // Overall progress bar
  const donePct = (done / total * 100).toFixed(1);
  const partialPct = (partial / total * 100).toFixed(1);
  document.getElementById('overall-progress').innerHTML = `
    <div class="header">
      <h2>Overall Gap Completion</h2>
      <div class="pct">${donePct}% done</div>
    </div>
    <div class="progress-bar">
      <div class="seg-done" style="width:${donePct}%"></div>
      <div class="seg-partial" style="width:${partialPct}%"></div>
    </div>
    <div class="progress-legend">
      <span><span class="dot" style="background:var(--done)"></span>Done</span>
      <span><span class="dot" style="background:var(--partial)"></span>Partial</span>
      <span><span class="dot" style="background:var(--bar-bg)"></span>Todo</span>
    </div>
  `;

  renderSubsystems();
  renderFilterBar();
  renderGaps();
}

function renderSubsystems() {
  const subs = data.subsystems;
  const gaps = data.gaps;
  let html = '';
  for (const [name, info] of Object.entries(subs)) {
    const subGaps = gaps.filter(g => g.subsystem === name);
    const subDone = subGaps.filter(g => g.status === 'done').length;
    const subPartial = subGaps.filter(g => g.status === 'partial').length;
    const subTotal = subGaps.length;
    const pct = info.pct;
    const barColor = pct >= 80 ? 'var(--done)' : pct >= 50 ? 'var(--partial)' : pct > 0 ? 'var(--todo)' : 'var(--border)';
    const activeClass = activeSubsystem === name ? ' active' : '';
    const displayName = name.replace(/_/g, ' ');
    html += `
      <div class="subsystem-card${activeClass}" onclick="toggleSubsystem('${name}')">
        <div class="name">${displayName}</div>
        <div class="mini-bar"><div class="fill" style="width:${pct}%; background:${barColor}"></div></div>
        <div class="pct-label" style="color:${barColor}">${pct}%</div>
        ${subTotal > 0 ? `<div class="gap-counts">${subDone}/${subTotal} gaps done${subPartial > 0 ? `, ${subPartial} partial` : ''}</div>` : '<div class="gap-counts">No tracked gaps</div>'}
      </div>
    `;
  }
  document.getElementById('subsystem-grid').innerHTML = html;
}

function renderFilterBar() {
  const filters = ['all', 'todo', 'partial', 'done'];
  let html = '<span class="filter-label">Status:</span>';
  for (const f of filters) {
    const cls = activeFilter === f ? ' active' : '';
    const label = f === 'all' ? 'All' : f.charAt(0).toUpperCase() + f.slice(1);
    html += `<button class="filter-btn${cls}" onclick="setFilter('${f}')">${label}</button>`;
  }
  document.getElementById('filter-bar').innerHTML = html;
}

function renderGaps() {
  let gaps = [...data.gaps];

  if (activeSubsystem) {
    gaps = gaps.filter(g => g.subsystem === activeSubsystem);
  }
  if (activeFilter !== 'all') {
    gaps = gaps.filter(g => g.status === activeFilter);
  }

  const tiers = {};
  for (const g of gaps) {
    if (!tiers[g.tier]) tiers[g.tier] = [];
    tiers[g.tier].push(g);
  }

  let html = '';
  for (const tier of Object.keys(tiers).sort((a, b) => a - b)) {
    const tierGaps = tiers[tier];
    const tierDone = tierGaps.filter(g => g.status === 'done').length;
    const tierTotal = tierGaps.length;
    const tierPct = tierTotal > 0 ? (tierDone / tierTotal * 100).toFixed(0) : 0;
    const barColor = tierPct >= 80 ? 'var(--done)' : tierPct >= 40 ? 'var(--partial)' : 'var(--todo)';

    html += `<div class="tier-section">
      <div class="tier-header">
        <h3>${TIER_NAMES[tier] || 'Tier ' + tier}</h3>
        <span class="tier-stats">${tierDone}/${tierTotal}</span>
        <div class="tier-bar"><div class="fill" style="width:${tierPct}%; background:${barColor}"></div></div>
      </div>`;

    for (const g of tierGaps) {
      html += `
        <div class="gap-row" onclick="this.classList.toggle('expanded')">
          <div class="gap-id">${g.id}</div>
          <div class="gap-title">
            ${escapeHtml(g.title)}
            <span class="severity-tag ${g.severity}">${g.severity}</span>
          </div>
          <div class="gap-subsystem">${g.subsystem.replace(/_/g, ' ')}</div>
          <div>
            <span class="badge ${g.status}">${g.status}</span>
            <div class="loc">${g.est_loc ? g.est_loc.toLocaleString() + ' LOC' : ''}</div>
          </div>
          <div class="notes">
            ${escapeHtml(g.notes || 'No notes.')}
            ${g.commit ? '<div class="commit-link">commit: ' + g.commit + '</div>' : ''}
          </div>
        </div>`;
    }
    html += '</div>';
  }

  if (gaps.length === 0) {
    html = '<div style="text-align:center; color:var(--text-dim); padding:40px;">No gaps match the current filter.</div>';
  }

  document.getElementById('gaps-container').innerHTML = html;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function setFilter(f) {
  activeFilter = f;
  renderFilterBar();
  renderGaps();
}

function toggleSubsystem(name) {
  activeSubsystem = activeSubsystem === name ? null : name;
  renderSubsystems();
  renderGaps();
}

loadData();
</script>
</body>
</html>
