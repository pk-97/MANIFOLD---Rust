[workspace]
resolver = "2"
members = [
    "crates/manifold-core",
    "crates/manifold-ui",
    "crates/manifold-playback",
    "crates/manifold-editing",
    "crates/manifold-io",
    "crates/manifold-renderer",
    "crates/manifold-app",
    "crates/manifold-native",
]

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4"] }
wgpu = "28"
winit = "0.30"
log = "0.4"
env_logger = "0.11"
pollster = "0.4"
kira = "0.9"
symphonia = { version = "0.5", features = ["all"] }
