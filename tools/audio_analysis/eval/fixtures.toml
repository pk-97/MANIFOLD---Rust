dataset = "slakh2100"
split = "dev"
domain = "other"  # Slakh derives from Lakh MIDI (broad multi-genre); the 20 babyslakh tracks sampled 2026-07-17 are guitar/piano/strings/brass-heavy, not electronic-genre — kept as "other" per "when in doubt, other"
roles = ["notes", "duration", "stems", "bring_up"]
