# The fixture manifest (§3): id, dataset, split (dev|heldout|full), roles,
# license note. Audio paths point outside this repo (gitignored / external
# dirs) — never committed. D9: dev = tuning loop; heldout = acceptance-only,
# never read by sweep.py; full = rare regression sweeps (not populated yet,
# P3's job).
#
# THIS FILE'S DEV/HELDOUT SPLIT IS A PROPOSAL — Peter vetoes/confirms in the
# morning (per the 2026-07-17 addendum: "Peter owes the split call, or the
# first ingest session proposes one"). Marked provisional throughout.
#
# DOMAIN (added 2026-07-17, Peter's second scope note): the target is
# electronic/EDM; the public MIR packs skew rock/pop/acoustic and must not
# dominate scoring. Every fixture below carries `domain = "electronic" |
# "other" | "mixed"` ("mixed" only for harmonixset, whose 912 tracks are
# tagged per-track via Genre in metadata.csv, not as one static value here).
# This file does NOT decide tuning policy (that's the orchestrator's
# choice) — it only exposes the split so run.py's scoreboard can report
# per-domain aggregates alongside the overall number.

schema_version = 1

# ---------------------------------------------------------------------------
# Public datasets
# ---------------------------------------------------------------------------

