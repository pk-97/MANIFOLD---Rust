# ---------------------------------------------------------------------------
# Live-show corpus (Addendum 2026-07-17) — Peter's 20-minute set, master
# export "29 MASTER 0012 [2026-04-26 161410].wav" (audio sample 0 = beat
# 112). Grid = tempoMap (98 points, <=2ms per Peter). Onset truth = clip
# starts on layers with measured excess >= 0.2 for an instrument class.
# Section truth = clip starts on layers with ~zero excess (deliberately
# valuable: measures false-positive rate on quiet/ambient material, which
# public onset benchmarks under-test).
#
# Song segmentation from the project's own timeline markers (7 song-start
# markers found 2026-07-17: MP INTRO@128, INTEGER@640, PATTERN@1088,
# STAGNATE@1280, BASALT@1728, ALL IN FOR YOU@2176, OH SO SUDDENLY@2416,
# through DONE@3104). The project ALSO has 6 named group layers (MIDNIGHT
# PATIENCE, INTEGER, STAGNATE, BASALT, ALL IN 4 U, WAITING 4 U) that mostly
# corroborate this but not 1:1 (6 vs 7, and "WAITING 4 U" has no matching
# marker) — flagging the discrepancy rather than silently picking one; Peter
# can resolve it in one glance.
#
# PROPOSED split (provisional): 5 songs dev, 2 heldout. Heldout picks one
# dense/drum-heavy song (BASALT, named for its own "HATS" marker — a good
# onset-truth stress test) and one long, varied song (STAGNATE, which has
# both DROP sections and its own quieter "STAGNATE" moment — a mixed onset+
# section test) so heldout isn't systematically easier or harder than dev.
# Rationale for dev-heavy skew: 7 songs is a small population; heldout needs
# only enough tracks to be a real regression check, not parity of count.
#
# DOMAIN CHECK (Peter's 2026-07-17 note: a heldout set that's all soft rock
# proves nothing about the target domain): both BASALT and STAGNATE are
# domain="electronic" — heldout overall is {musdb18_compressed (other),
# liveshow_basalt (electronic), liveshow_stagnate (electronic)}, so the
# electronic target genre IS represented in heldout, not just the
# off-domain MUSDB18 pop/rock set. Once harmonixset's per-track audio
# matching lands (P3), its electronic slice must ALSO be split across both
# dev and heldout for the same reason — don't let all 129 Dance/Electronic
# Harmonix tracks land in dev only.
# ---------------------------------------------------------------------------

